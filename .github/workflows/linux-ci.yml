name: Linux CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Built inside manylinux_2_34 (AlmaLinux 9, glibc 2.34, GCC 14).
# Binaries run on any Linux from ~2022+ (Ubuntu 22.04, Fedora 35, Debian 12, RHEL 9).

jobs:
  build-linux-x86_64:
    name: Linux x86_64 (generic + AVX2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + test inside manylinux_2_34
        run: |
          for i in 1 2 3; do
            docker pull quay.io/pypa/manylinux_2_34_x86_64 && break
            echo "Attempt $i failed, retrying in 30s..."; sleep 30
          done
          docker run --rm \
            -v "$PWD:/project" \
            quay.io/pypa/manylinux_2_34_x86_64 \
            bash /project/.github/scripts/build-manylinux.sh
          sudo chown -R "$USER:$USER" dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-x86_64
          path: dist/mipster-linux-x86_64.tar.gz

  build-linux-aarch64:
    name: Linux aarch64 (generic/ARMv8-A + neon/ARMv8.2-A)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build + test inside manylinux_2_34_aarch64
        run: |
          for i in 1 2 3; do
            docker pull quay.io/pypa/manylinux_2_34_aarch64 && break
            echo "Attempt $i failed, retrying in 30s..."; sleep 30
          done
          docker run --rm \
            -v "$PWD:/project" \
            quay.io/pypa/manylinux_2_34_aarch64 \
            bash /project/.github/scripts/build-manylinux-aarch64.sh
          sudo chown -R "$USER:$USER" dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-aarch64
          path: dist/mipster-linux-aarch64.tar.gz

  build-macos-x86_64:
    name: macOS x86_64 (generic + haswell)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Build + test
        run: bash .github/scripts/build-macos-x86_64.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-x86_64
          path: dist/mipster-macos-x86_64.tar.gz

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon, M1+)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + test
        run: bash .github/scripts/build-macos-arm64.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-arm64
          path: dist/mipster-macos-arm64.tar.gz

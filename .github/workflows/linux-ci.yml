name: Linux CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Built inside manylinux_2_34 (AlmaLinux 9, glibc 2.34, GCC 14).
# Binaries run on any Linux from ~2022+ (Ubuntu 22.04, Fedora 35, Debian 12, RHEL 9).

jobs:
  build-linux-x86_64:
    name: Linux x86_64 (generic + AVX2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + test inside manylinux_2_34
        run: |
          for i in 1 2 3; do
            docker pull quay.io/pypa/manylinux_2_34_x86_64 && break
            echo "Attempt $i failed, retrying in 30s..."; sleep 30
          done
          docker run --rm \
            -v "$PWD:/project" \
            quay.io/pypa/manylinux_2_34_x86_64 \
            bash /project/.github/scripts/build-manylinux.sh
          sudo chown -R "$USER:$USER" dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-x86_64
          path: dist/mipster-linux-x86_64.tar.gz

  build-linux-aarch64:
    name: Linux aarch64 (generic/ARMv8-A + neon/ARMv8.2-A)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build + test inside manylinux_2_34_aarch64
        run: |
          for i in 1 2 3; do
            docker pull quay.io/pypa/manylinux_2_34_aarch64 && break
            echo "Attempt $i failed, retrying in 30s..."; sleep 30
          done
          docker run --rm \
            -v "$PWD:/project" \
            quay.io/pypa/manylinux_2_34_aarch64 \
            bash /project/.github/scripts/build-manylinux-aarch64.sh
          sudo chown -R "$USER:$USER" dist/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-aarch64
          path: dist/mipster-linux-aarch64.tar.gz

  build-macos-x86_64:
    name: macOS x86_64 (generic + haswell)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Build + test (x86_64 via Rosetta)
        run: arch -x86_64 bash .github/scripts/build-macos-x86_64.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-x86_64
          path: dist/mipster-macos-x86_64.tar.gz

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon, M1+)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build + test
        run: bash .github/scripts/build-macos-arm64.sh

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-arm64
          path: dist/mipster-macos-arm64.tar.gz

  build-windows-x86_64:
    name: Windows x86_64 (generic + AVX2)
    runs-on: windows-latest
    defaults:
      run:
        shell: C:\msys64\usr\bin\bash.exe -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW64 toolchain
        run: |
          pacman-key --init
          pacman-key --populate msys2
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            make \
            autoconf automake libtool pkg-config zip mingw-w64-x86_64-nsis

      - name: Build + test
        run: |
          export PATH="/mingw64/bin:/usr/bin:$PATH"
          # MSYS2 login shell may start in a different cwd; use cygpath to get a
          # reliable POSIX path to the workspace and invoke the script absolutely.
          SRC="$(cygpath -u "${GITHUB_WORKSPACE}")"
          bash "${SRC}/.github/scripts/build-windows.sh"

      - uses: actions/upload-artifact@v4
        with:
          name: mipster-windows-x86_64
          path: dist/mipster-windows-x86_64.zip

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mipster-windows-x86_64-installer
          path: dist/mipster-*-setup-windows-x86_64.exe

  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: [build-linux-x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-extra texlive-fonts-recommended \
            python3 python3-pip

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-linux-x86_64
          path: dist/

      - name: Extract and install binary
        run: |
          ls dist/
          tar -xzf dist/mipster-linux-x86_64.tar.gz -C dist/
          DIST_DIR="$(pwd)/dist/mipster-linux-x86_64"
          MIPSTER_BIN="${DIST_DIR}/bin/mipster-generic"
          chmod +x "$MIPSTER_BIN"
          echo "MIPSTER_BIN=$MIPSTER_BIN" >> $GITHUB_ENV
          # mipster-generic links against libmipster.so — add lib dirs to LD_LIBRARY_PATH
          echo "LD_LIBRARY_PATH=${DIST_DIR}/lib/generic:${DIST_DIR}/lib/avx2" >> $GITHUB_ENV

      - name: Generate docs
        run: |
          bash doc/generate_docs.sh "$MIPSTER_BIN"

      - name: Upload docs artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mipster-docs
          path: |
            doc/mipster.1
            doc/mipster-parameters.pdf
            doc/mipster-parameters.md
            doc/mipster-parameters.tex

      - name: Upload website artifact
        uses: actions/upload-artifact@v4
        with:
          name: mipster-website
          path: docs/

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [generate-docs]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Download website artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-website
          path: docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  package-linux-x86_64:
    name: Linux packages (DEB/RPM/Arch x86_64)
    runs-on: ubuntu-latest
    needs: [build-linux-x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Install fpm (DEB/RPM builder)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-linux-x86_64
          path: dist/

      - name: Build DEB and RPM packages
        run: |
          git fetch --tags --quiet 2>/dev/null || true
          chmod +x .github/scripts/build-linux-packages.sh
          .github/scripts/build-linux-packages.sh dist/mipster-linux-x86_64.tar.gz x86_64

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-x86_64-deb
          path: "*.deb"

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-x86_64-rpm
          path: "*.rpm"

  package-linux-aarch64:
    name: Linux packages (DEB/RPM aarch64)
    runs-on: ubuntu-latest
    needs: [build-linux-aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Install fpm (DEB/RPM builder)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ruby ruby-dev build-essential rpm
          sudo gem install fpm --no-document

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-linux-aarch64
          path: dist/

      - name: Build DEB and RPM packages
        run: |
          git fetch --tags --quiet 2>/dev/null || true
          chmod +x .github/scripts/build-linux-packages.sh
          .github/scripts/build-linux-packages.sh dist/mipster-linux-aarch64.tar.gz aarch64

      - name: Upload DEB package
        uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-aarch64-deb
          path: "*.deb"

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-aarch64-rpm
          path: "*.rpm"

  package-arch-x86_64:
    name: Arch Linux package (x86_64)
    runs-on: ubuntu-latest
    needs: [build-linux-x86_64]
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          pacman -Sy --noconfirm base-devel git

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-linux-x86_64
          path: dist/

      - name: Build Arch package
        run: |
          git fetch --tags --quiet 2>/dev/null || true
          # makepkg cannot run as root; create a build user
          useradd -m builder
          chown -R builder:builder dist/
          chmod +x .github/scripts/build-linux-packages.sh
          chown builder:builder .github/scripts/build-linux-packages.sh
          # builder needs write access to workspace root to deposit the .pkg.tar.zst
          chown builder:builder .
          sudo -u builder bash .github/scripts/build-linux-packages.sh \
            dist/mipster-linux-x86_64.tar.gz x86_64

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: mipster-linux-arch-x86_64
          path: "*.pkg.tar.zst"

  package-macos-arm64:
    name: macOS pkg (arm64)
    runs-on: macos-latest
    needs: [build-macos-arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-macos-arm64
          path: dist/

      - name: Build .pkg installer
        run: |
          chmod +x .github/scripts/build-macos-packages.sh
          .github/scripts/build-macos-packages.sh dist/mipster-macos-arm64.tar.gz arm64

      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-arm64-pkg
          path: "*.pkg"

  package-macos-x86_64:
    name: macOS pkg (x86_64)
    runs-on: macos-latest
    needs: [build-macos-x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mipster-macos-x86_64
          path: dist/

      - name: Build .pkg installer
        run: |
          chmod +x .github/scripts/build-macos-packages.sh
          .github/scripts/build-macos-packages.sh dist/mipster-macos-x86_64.tar.gz x86_64

      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: mipster-macos-x86_64-pkg
          path: "*.pkg"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos-x86_64
      - build-macos-arm64
      - build-windows-x86_64
      - package-linux-x86_64
      - package-linux-aarch64
      - package-arch-x86_64
      - package-macos-arm64
      - package-macos-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts/

      - name: Collect and rename release assets
        run: |
          mkdir -p release/
          # Tarballs / zip — predictable names for /releases/latest/download/
          cp all-artifacts/mipster-linux-x86_64/*.tar.gz   release/mipster-linux-x86_64.tar.gz
          cp all-artifacts/mipster-linux-aarch64/*.tar.gz  release/mipster-linux-aarch64.tar.gz
          cp all-artifacts/mipster-macos-x86_64/*.tar.gz   release/mipster-macos-x86_64.tar.gz
          cp all-artifacts/mipster-macos-arm64/*.tar.gz    release/mipster-macos-arm64.tar.gz
          cp all-artifacts/mipster-windows-x86_64/*.zip    release/mipster-windows-x86_64.zip
          # Windows installer (rename to predictable name)
          find all-artifacts/mipster-windows-x86_64-installer/ -name '*.exe' \
            -exec cp {} release/mipster-windows-x86_64-setup.exe \;
          # Linux DEB/RPM (rename to predictable names)
          find all-artifacts/mipster-linux-x86_64-deb/  -name '*.deb' \
            -exec cp {} release/mipster-linux-x86_64.deb \;
          find all-artifacts/mipster-linux-x86_64-rpm/  -name '*.rpm' \
            -exec cp {} release/mipster-linux-x86_64.rpm \;
          find all-artifacts/mipster-linux-aarch64-deb/ -name '*.deb' \
            -exec cp {} release/mipster-linux-aarch64.deb \;
          find all-artifacts/mipster-linux-aarch64-rpm/ -name '*.rpm' \
            -exec cp {} release/mipster-linux-aarch64.rpm \;
          # Arch package
          find all-artifacts/mipster-linux-arch-x86_64/ -name '*.pkg.tar.zst' \
            -exec cp {} release/mipster-linux-x86_64-arch.pkg.tar.zst \;
          # macOS .pkg installers
          find all-artifacts/mipster-macos-arm64-pkg/   -name '*.pkg' \
            -exec cp {} release/mipster-macos-arm64.pkg \;
          find all-artifacts/mipster-macos-x86_64-pkg/  -name '*.pkg' \
            -exec cp {} release/mipster-macos-x86_64.pkg \; 2>/dev/null || true
          echo "==> Release assets:"
          ls -lh release/

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "MIPster ${TAG}" \
            --generate-notes \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
